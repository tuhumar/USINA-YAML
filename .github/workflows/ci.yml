name: CI

on:
  push:
    branches:
      - main
      - feat/**
      - docs/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest

      - name: Run unit tests
        run: pytest -q

      - name: Smoke test valid fixture
        run: usina validate tests/fixtures/valid/minimal_valid.usina.yaml

      - name: Smoke test invalid fixture
        run: |
          usina lint tests/fixtures/invalid/timeline_overlap.usina.yaml && exit 1 || exit 0
